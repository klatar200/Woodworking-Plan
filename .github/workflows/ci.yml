name: CI

# BUILD_PLAN.md §4, Sprint 0: "CI pipeline (lint/typecheck/test on every push)".
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch — keeps GitHub Actions minutes low,
# which matters under the $0-during-development constraint (DECISIONS_LOG.md).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Prisma's generated client is gitignored, so it must be generated before
      # typecheck/build can resolve @prisma/client's types.
      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # No secrets are provided to this step, on purpose: the build must succeed
      # without DATABASE_URL or Clerk keys. If it ever doesn't, that is a real
      # bug — it would mean the app hard-depends on a secret at build time.
      - name: Build
        run: npm run build
